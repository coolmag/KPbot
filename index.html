<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>AI Proposal System</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:56px;
}

.hero p{
font-size:22px;
opacity:0.8;
}

.btn{
background:#6366f1;
padding:18px 35px;
border-radius:12px;
text-decoration:none;
color:white;
font-size:18px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:60px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>AI Генератор Коммерческих Предложений</h1>

<p>
Интерактивные предложения нового поколения
</p>

<a class="btn">Создать предложение</a>

</div>

<div class="cards">

<div class="card">
<h3>AI генерация</h3>
<p>Предложения создаются автоматически.</p>
</div>

<div class="card">
<h3>Аналитика</h3>
<p>Система видит когда клиент читает КП.</p>
</div>

<div class="card">
<h3>Онлайн чат</h3>
<p>Клиент может задать вопрос прямо в предложении.</p>
</div>

</div>

</div>

</body>
</html>
