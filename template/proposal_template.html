<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Коммерческое предложение</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
}

.header{
font-size:32px;
font-weight:bold;
}

.box{
background:#f5f5f5;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.plan{
border:1px solid #ddd;
padding:15px;
margin-top:15px;
border-radius:8px;
}

.btn{
background:#1a252f;
color:white;
padding:15px 25px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">Коммерческое предложение</div>

<div class="box">

<h3>Клиент</h3>
<p>{{client}}</p>

<h3>Задача</h3>
<p>{{task}}</p>

</div>

<h2>Варианты решения</h2>

{{plans}}

<a class="btn">
Принять предложение
</a>

</body>

</html>
